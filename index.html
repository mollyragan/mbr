<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>molly baker ragan</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --sz: 300px; }

  html, body { height: 100%; font-family: sans-serif; color: #000; background: #fff; overflow: hidden; }
  a { color: inherit; text-decoration: none; }

  #canvas { position: fixed; inset: 0; overflow: hidden; }

  /* ── BOTTOM BAR ── */
  #bottom-bar {
    position: fixed;
    bottom: 16px;
    right: 22px;
    font-size: 13px;
    z-index: 201;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }
  #links-toggle {
    display: block;
    width: 13px;
    height: 13px;
  }
  #links-toggle img {
    width: 100%;
    height: 100%;
    display: block;
    transition: transform 0.2s ease;
    transform-origin: center;
  }
  #links-toggle:hover img, #links-toggle.active img {
    transform: scale(1.15);
  }
  #links-list {
    display: none; flex-direction: column; align-items: flex-end;
    gap: 13px; margin-bottom: 13px;
  }
  #links-list.visible { display: flex; }
  #links-list a { color: #000; }
  #links-list a img {
    width: 15px; height: 15px; display: block; object-fit: contain;
    transition: transform 0.2s ease; transform-origin: center;
  }
  #links-list a:hover img { transform: scale(1.15); }

  /* ── SITE NAME ── */
  #site-name {
    position: fixed; top: 16px; left: 22px;
    font-size: 13px; font-weight: 400;
    cursor: pointer; user-select: none; z-index: 203; line-height: 1.6;
  }
  #site-name-label {
    font-weight: 400;
    transition: font-weight 0.15s ease;
  }
  #site-name.active #site-name-label,
  #site-name:hover #site-name-label {
    font-weight: 700;
  }

  /* ── INDEX ITEMS ── */
  .index-item {
    position: absolute;
    display: flex; flex-direction: column; align-items: center;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .index-item.layout-animating {
    transition: left 0.5s cubic-bezier(0.4,0,0.2,1), top 0.5s cubic-bezier(0.4,0,0.2,1),
                width 0.5s cubic-bezier(0.4,0,0.2,1), height 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .index-thumb-wrap {
    width: var(--sz); height: var(--sz);
    background: transparent; overflow: hidden; cursor: grab;
    position: relative;
  }
  .index-thumb-wrap:hover { transform: scale(1.05); transition: transform 0.2s ease; }
  .index-thumb-wrap:active { cursor: grabbing; }
  .index-thumb-wrap img { width: 100%; height: 100%; object-fit: contain; object-position: bottom left; display: block; pointer-events: none; }

  /* ── RESIZE HANDLE ── */
  .resize-handle {
    position: absolute;
    width: 14px; height: 14px;
    cursor: default;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 11;
    transform: translate(50%, 50%);
    border-radius: 50%;
    background: #000;
  }
  .index-thumb-wrap:hover .resize-handle { opacity: 0.45; }
  .resize-handle:hover { opacity: 1 !important; }

  /* ── GALLERY OVERLAY ── */
  #gallery-overlay {
    position: fixed; top: 0; bottom: 0; left: 0;
    z-index: 150; background: #fff;
    overflow-x: hidden; overflow-y: auto;
    display: none;
    -webkit-overflow-scrolling: auto;
    overscroll-behavior: none;
  }
  #gallery-grid { display: grid; gap: 0; width: 100%; }
  #gallery-grid img { width: 100%; object-fit: cover; display: block; cursor: pointer; }

  /* desktop pinned project title */
  #desk-panel-title {
    position: fixed; bottom: 16px; left: 22px;
    font-size: 13px; font-weight: 400; color: #000;
    z-index: 203; line-height: 1;
    opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.45s cubic-bezier(0.4,0,0.2,1);
  }
  #desk-panel-title.visible { opacity: 1; pointer-events: auto; }
  #desk-panel-title a { color: #000; text-decoration: none; }
  #desk-panel-title a:hover { font-weight: 700; }

  #desk-panel-title:not(.visible) {
  transform: translateX(-120%);
}

  /* ── CLOSE BTN ── */
  #gallery-close-btn {
    position: fixed; top: 16px; right: 24px;
    font-size: 13px; color: #000; cursor: pointer;
    opacity: 0.7; z-index: 202; display: none;
  }
  #gallery-close-btn:hover { opacity: 1; }

  /* ── LIGHTBOX ── */
  #lightbox {
    position: fixed; inset: 0; z-index: 300;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(255,255,255,0.95);
    gap: 14px;
  }
  #lightbox.visible { display: flex; }
  #lightbox-inner {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    width: fit-content; max-width: min(500px, 90vw);
  }
  #lightbox-img {
    max-width: min(500px, 90vw); max-height: min(500px, 80vh);
    width: auto; height: auto; object-fit: contain; display: block;
  }
  #lightbox-prev, #lightbox-next {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none;
    font-size: 13px; color: #000; cursor: pointer;
    padding: 8px; user-select: none; font-family: sans-serif;
  }
  #lightbox-prev:hover, #lightbox-next:hover { opacity: 1; }
  #lightbox-prev { left: -100px; }
  #lightbox-next { right: -100px; }
  #lightbox-meta {
    font-size: 13px; font-weight: 400; color: #000000;
    text-align: center; line-height: 1.75; font-family: sans-serif;
  }
  #lightbox-meta a { color: inherit; text-decoration: none; }
  #lightbox-meta a:hover { font-weight: 700; }
  #lightbox-close {
    position: fixed; top: 16px; right: 24px;
    font-size: 13px; color: #000; cursor: pointer;
    opacity: 0.7; z-index: 301;
  }
  #lightbox-close:hover { opacity: 1; }

  /* mobile pinned title */
  #mob-panel-title { display: none; }

  /* ── MOBILE ── */
  @media (max-aspect-ratio: 1/1) {
    #bottom-bar {
      left: 0; right: 0; bottom: 0; width: 100%;
      flex-direction: row; justify-content: space-between; align-items: flex-end;
      padding: 10px 22px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 201;
    }
    #links-list { align-items: flex-end; }
    #site-name { z-index: 201; }
    #site-name:hover #site-name-label { font-weight: 400; }
    #gallery-close-btn { top: 16px; right: 16px; }
    #lightbox-close { top: 16px; right: 16px; display: none; }
    #gallery-overlay { width: 100% !important; overscroll-behavior: auto; }
    #lightbox-img { max-width: 90vw; max-height: 70vh; }
    #lightbox-prev, #lightbox-next { padding: 24px 16px; font-size: 11px; }
    #lightbox-prev { left: -20px; display: none; }
    #lightbox-next { right: -20px; display: none; }
    #mob-panel-title {
      display: block;
      z-index: 201;
      font-size: 13px; font-weight: 400; color: #000;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.45s cubic-bezier(0.4,0,0.2,1); flex-shrink: 0; line-height: 1;
    }
    #mob-panel-title.visible { opacity: 1; pointer-events: auto; }
    #mob-panel-title a { color: #000; text-decoration: none; }
    #mob-panel-title a:hover { font-weight: 700; }
    #mob-panel-title:not(.visible) {
      transform: translateX(-120%);
    }
  }

  /* ── ZINES GALLERY THEME OVERRIDES ── */
  body.zines-open #site-name-label { color: white; }
  body.zines-open #desk-panel-title,
  body.zines-open #mob-panel-title { color: white; }
  body.zines-open #desk-panel-title a,
  body.zines-open #mob-panel-title a { color: white; }
  body.zines-open #gallery-close-btn { color: white; opacity: 1; }
  body.zines-open #lightbox-close,
  body.zines-open #lightbox-prev,
  body.zines-open #lightbox-next { color: white; }
  body.zines-open #links-list img,
  body.zines-open #links-toggle img { filter: brightness(0) invert(1); }
</style>

<script>
// ── PROJECTS ──
const projects = {
  zines:        { title: 'all the zine ive made',                                          gallery: true  },
  whatdoyousee: { title: 'whatdoyousee.nyc', link: 'https://www.whatdoyousee.nyc' },
  unlearning:   { title: 'unlearning library', link: 'https://www.unlearninglibrary.com' },
  bioephemera:  { title: 'all the leaves n things ive stashed in my books',           gallery: true  },
  unsubscribe:  { title: 'all the newsletters ive unsubscribed from',           gallery: true  },
  headphones:   { title: 'all the times ive untangled my headphones',           gallery: true  },
  trees:        { title: 'all the street trees ive met', gallery: true }
};

// ── SUPABASE ──
const SUPABASE_URL      = 'https://krkcskfledxweimduvvn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtya2Nza2ZsZWR4d2VpbWR1dnZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjYzNzIsImV4cCI6MjA5NjcwMjM3Mn0.QIX2_UqDzATZ-NzhjFQUGIpsBxGn1D640viI9QG38rY';

async function fetchGalleryImages() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/images?select=project,url,sort_order,taken_at,location,lat,lng,plant,book,scanned,book_link,question_1,question_2&order=sort_order.desc`,
      { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    const data = await res.json();
    if (!Array.isArray(data)) return;

    const byProject = {};
    data.forEach(row => {
      if (!byProject[row.project]) byProject[row.project] = [];
      byProject[row.project].push({
        url:       row.url,
        taken_at:  row.taken_at  || null,
        location:  row.location  || null,
        lat:       row.lat       ?? null,
        lng:       row.lng       ?? null,
        plant:     row.plant     || null,
        book:      row.book      || null,
        scanned:   row.scanned   || null,
        book_link: row.book_link || null,
        question_1:row.question_1 || null,
        question_2:row.question_2 || null,
      });
    });

    const monthMap = { jan:0, feb:1, mar:2, apr:3, may:4, june:5, july:6, aug:7, sep:8, oct:9, nov:10, dec:11 };

    Object.keys(byProject).forEach(key => {
      if (!projects[key]) return;

      if (key === 'bioephemera') {
        byProject[key].sort((a, b) => {
          const parse = s => {
            if (!s) return null;
            const [mon, yr] = s.trim().split(' ');
            if (!mon || !yr) return null;
            return new Date(parseInt(yr), monthMap[mon] ?? 0);
          };
          const da = parse(a.scanned), db = parse(b.scanned);
          if (!da && !db) return 0;
          if (!da) return 1;
          if (!db) return -1;
          return db - da;
        });
      }
      if (key === 'trees') {
        byProject[key].sort((a, b) => {
          if (!a.taken_at && !b.taken_at) return 0;
          if (!a.taken_at) return 1;
          if (!b.taken_at) return -1;
          return new Date(b.taken_at) - new Date(a.taken_at);
        });
      }

      projects[key].images = byProject[key];

      const item = document.querySelector(`.index-item[data-project="${key}"]`);
      if (item) {
        const img = item.querySelector('.index-thumb-wrap img');
        const firstUrl = byProject[key][0].url;
        if (img && firstUrl && !firstUrl.endsWith('.pdf')) {
          img.src = firstUrl;
        }
      }
    });
  } catch (e) {
    console.warn('Could not fetch gallery images:', e);
  }
}

// ── DOM REFS ──
const canvas          = document.getElementById('canvas');
const siteName        = document.getElementById('site-name');
const linksToggle     = document.getElementById('links-toggle');

const galleryCloseBtn = document.getElementById('gallery-close-btn');

const lightboxNext    = document.getElementById('lightbox-next');

// ── STATE ──
let activeKey         = null;
let lightboxImages    = [];

let poppingState      = false;
let suppressNextClick = false;
let highestZ          = 1;
let mobileZoomScale   = 1;
let mobileZoomLastDist = null;
let closeGalleryTimer = null

// Returns true when viewport is portrait (mobile layout)
function isMob() { return window.innerWidth < window.innerHeight; }

function bringToFront(item) {
  item.style.zIndex = ++highestZ;
}

// Per-item layout state: { left, top, size, pinned }
const itemState = {};

function applyItemState(item, key, animate) {
  const s = itemState[key];
  if (!s) return;
  const wrap = item.querySelector('.index-thumb-wrap');
  if (animate) item.classList.add('layout-animating');
  item.style.left = s.left + 'px';
  item.style.top  = s.top  + 'px';
  wrap.style.width  = s.size + 'px';
  wrap.style.height = s.size + 'px';
  if (animate) setTimeout(() => item.classList.remove('layout-animating'), 520);
}

// ── LAYOUTS ──
const LAYOUTS_DESKTOP = [

  [[52.4,11.0,15.5],[30.6,23.9,15.5],[72.7,15.0,13.5],[9.1,31.2,16.1],[32.1,66.8,15.5],[65.0,55.0,13.5],[18.0,62.0,13.5]],
  [[31.6,29.7,14.7],[52.7,26.4,14.7],[55.1,60.8,16.2],[30.4,61.5,15.2],[4.9,44.1,14.7],[75.0,28.0,14.7],[68.0,52.0,15.2]],
  [[22.1,23.1,15.6],[54.3,13.2,15.6],[1.7,53.4,14.5],[31.1,64.8,15.2],[58.1,63.9,15.6],[75.0,53.0,14.5],[70.0,8.0,15.6]],
  [[48.7,7.5,14.0],[26.2,26.0,14.0],[75.8,49.0,16.2],[40.6,62.4,15.6],[62.8,57.7,14.0],[5.0,7.0,14.0],[15.0,55.0,14.0]],
  [[67.1,16.8,15.6],[30.4,10.8,15.6],[12.1,35.3,16.6],[47.6,47.9,15.2],[50.5,15.3,15.6],[75.0,63.0,15.2],[8.0,62.0,15.2]],
];
const LAYOUTS_MOBILE = [
  [[28.5,8,28.1],[10.9,72,28.1],[63.7,30,32.0],[69.1,55,26.3],[58.0,8,28.1],[10.0,45,28.1],[40.0,20,26.3]],
  [[46.1,8,22.8],[15.3,20,22.8],[48.4,38,32.0],[52.4,65,30.0],[10.1,55,22.8],[65.0,65,22.8],[30.0,50,22.8]],
  [[31.2,15,28.7],[68.9,38,28.7],[5.7,52,32.0],[54.7,72,24.9],[26.7,72,28.7],[10.0,8,28.7],[55.0,20,24.9]],
  [[56.3,25,25.5],[22.5,8,25.5],[18.1,65,32.0],[62.9,72,26.0],[17.1,35,25.5],[55.7,48,25.5],[38.0,15,26.0]],
  [[15.1,8,26.8],[7.3,48,26.8],[56.5,8,32.0],[36.5,30,26.7],[70.0,65,26.8],[35.2,68,26.8],[60.0,40,26.7]],
  [[8.8,8,24.3],[30.9,32,24.3],[65.1,8,32.0],[42.8,68,26.3],[10.0,62,24.3],[65.0,60,24.3],[45.0,45,24.3]],
  [[58.8,8,25.7],[36.9,45,25.7],[23.6,22,32.0],[11.7,68,24.9],[74.8,72,25.7],[10.0,8,25.7],[48.0,60,24.9]],
  [[64.7,8,27.1],[43.9,68,27.1],[18.8,18,32.0],[53.3,42,22.8],[7.9,68,27.1],[65.0,8,27.1],[30.0,30,22.8]],
  [[25.7,8,26.5],[61.9,8,26.5],[25.7,65,32.0],[63.5,68,27.6],[12.1,32,26.5],[57.6,45,26.5],[42.0,50,27.6]],
  [[70.1,10,24.9],[19.9,28,24.9],[62.9,38,32.0],[14.1,50,23.7],[56.5,65,24.9],[10.0,8,24.9],[38.0,70,23.7]],
];
let currentLayout = 0;

function randomLayout(animate) {
  const iw = window.innerWidth, ih = window.innerHeight;
  const mob = isMob();
  const layouts = mob ? LAYOUTS_MOBILE : LAYOUTS_DESKTOP;
  const layout = layouts[currentLayout % layouts.length];
  currentLayout = Math.floor(Math.random() * layouts.length);

  Array.from(document.querySelectorAll('.index-item')).forEach((item, i) => {
    const key = item.dataset.project;

    if (itemState[key] && itemState[key].pinned) {
      applyItemState(item, key, animate);
      return;
    }

    const [xPct, yPct, wPct] = layout[i] || [10 + i * 12, 30, 15];
    const sz   = Math.round((wPct / 100) * iw);
    const wrap = item.querySelector('.index-thumb-wrap');

    if (animate) item.classList.add('layout-animating');
    wrap.style.width  = sz + 'px';
    wrap.style.height = sz + 'px';

    const left    = Math.round((xPct / 100) * iw);
    const topMargin = mob ? 60 : 0, botMargin = mob ? 60 : 0;
    const usableH = ih - topMargin - botMargin;
    const yRaw    = mob
      ? topMargin + ((yPct - 6) / (91 - 6)) * usableH
      : (yPct / 100) * ih;
    const top = Math.round(Math.max(topMargin, Math.min(ih - sz - botMargin, yRaw)));

    item.style.left = left + 'px';
    item.style.top  = top  + 'px';
    if (animate) setTimeout(() => item.classList.remove('layout-animating'), 520);

    itemState[key] = { left, top, size: sz, pinned: false };
  });
}

// ── DRAG (desktop mouse) ──
function initDrag(item) {
  const key  = item.dataset.project;
  const wrap = item.querySelector('.index-thumb-wrap');

  let dragging = false, moved = false;
  let startX, startY, origLeft, origTop;

  wrap.addEventListener('mousedown', e => {
    if (e.target.classList.contains('resize-handle') ||
        e.target.classList.contains('edge-n') ||
        e.target.classList.contains('edge-s') ||
        e.target.classList.contains('edge-e') ||
        e.target.classList.contains('edge-w') ||
        e.target.classList.contains('resize-corner')) return;
    e.preventDefault();
    dragging = true;
    moved    = false;
    startX   = e.clientX;
    startY   = e.clientY;
    origLeft = parseInt(item.style.left) || 0;
    origTop  = parseInt(item.style.top)  || 0;
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
    if (!moved) return;
    item.style.left = (origLeft + dx) + 'px';
    item.style.top  = (origTop  + dy) + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    document.body.style.userSelect = '';
    if (moved) {
      bringToFront(item);
      const s = itemState[key] || {};
      itemState[key] = {
        left:   parseInt(item.style.left),
        top:    parseInt(item.style.top),
        size:   s.size || parseInt(wrap.style.width) || 200,
        pinned: true,
      };
    } else {
      item.style.zIndex = '';
    }
  });

  // Suppress click if we dragged
  wrap.addEventListener('click', e => {
    if (moved) e.stopImmediatePropagation();
  }, true);
}

// ── RESIZE (desktop mouse, corner handle + edges) ──
function initResize(item) {
  const key    = item.dataset.project;
  const wrap   = item.querySelector('.index-thumb-wrap');
  const handle = wrap.querySelector('.resize-handle');
  const img    = wrap.querySelector('img');
  const edgeN  = wrap.querySelector('.edge-n');
  const edgeS  = wrap.querySelector('.edge-s');
  const edgeE  = wrap.querySelector('.edge-e');
  const edgeW  = wrap.querySelector('.edge-w');
  const MIN_SIZE = 60;

  function getImageBounds() {
    const boxSize = parseInt(wrap.style.width) || wrap.offsetWidth || 200;
    const nat = img.naturalWidth && img.naturalHeight
      ? img.naturalWidth / img.naturalHeight : 1;
    let imgW, imgH;
    if (nat >= 1) { imgW = boxSize; imgH = boxSize / nat; }
    else          { imgH = boxSize; imgW = boxSize * nat; }
    return { imgW, imgH, imgTop: boxSize - imgH, imgLeft: 0 };
  }

  function updateHandleAndEdges() {
    const { imgW, imgH, imgTop, imgLeft } = getImageBounds();
    const EW = 10;

    handle.style.left   = (imgLeft + imgW) + 'px';
    handle.style.top    = (imgTop  + imgH) + 'px';
    handle.style.bottom = 'auto';
    handle.style.right  = 'auto';

    edgeN.style.cssText = `top:${imgTop}px; left:${imgLeft}px; width:${imgW}px; height:${EW}px; position:absolute;`;
    edgeS.style.cssText = `top:${imgTop + imgH - EW}px; left:${imgLeft}px; width:${imgW}px; height:${EW}px; position:absolute;`;
    edgeE.style.cssText = `top:${imgTop}px; left:${imgLeft + imgW - EW}px; width:${EW}px; height:${imgH}px; position:absolute;`;
    edgeW.style.cssText = `top:${imgTop}px; left:${imgLeft}px; width:${EW}px; height:${imgH}px; position:absolute;`;

    cornerNW.style.left = '-10px';        cornerNW.style.top = (imgTop - 10) + 'px';
    cornerNE.style.left = (imgW - 10) + 'px'; cornerNE.style.top = (imgTop - 10) + 'px';
    cornerSW.style.left = '-10px';        cornerSW.style.top = (imgTop + imgH - 10) + 'px';
  }

  img.addEventListener('load', updateHandleAndEdges);
  if (img.complete && img.naturalWidth) updateHandleAndEdges();
  new ResizeObserver(updateHandleAndEdges).observe(wrap);

  // Extra corner handles: nw, ne, sw (se = the dot handle)
  const cornerNW = document.createElement('div');
  const cornerNE = document.createElement('div');
  const cornerSW = document.createElement('div');
  [cornerNW, cornerNE, cornerSW].forEach(c => {
    c.classList.add('resize-corner');
    c.style.cssText = 'position:absolute;width:20px;height:20px;z-index:11;opacity:0;';
    wrap.appendChild(c);
  });

  let resizing = false, resizeDidFire = false;
  let startX, startY, origSize, origLeft, origTop, resizeAxis;

  wrap.addEventListener('click', e => {
    if (resizeDidFire) { e.stopImmediatePropagation(); resizeDidFire = false; }
  }, true);

  function startResize(e, axis) {
    e.preventDefault();
    e.stopPropagation();
    resizing      = true;
    resizeDidFire = true;
    resizeAxis    = axis;
    startX    = e.clientX; startY = e.clientY;
    origSize  = parseInt(wrap.style.width) || wrap.offsetWidth || 200;
    origLeft  = parseInt(item.style.left) || 0;
    origTop   = parseInt(item.style.top)  || 0;
    bringToFront(item);
    document.body.style.userSelect = 'none';
  }

  handle.addEventListener('mousedown',   e => startResize(e, 'se'));
  cornerNW.addEventListener('mousedown', e => startResize(e, 'nw'));
  cornerNE.addEventListener('mousedown', e => startResize(e, 'ne'));
  cornerSW.addEventListener('mousedown', e => startResize(e, 'sw'));
  edgeN.addEventListener('mousedown',    e => startResize(e, 'n'));
  edgeS.addEventListener('mousedown',    e => startResize(e, 's'));
  edgeE.addEventListener('mousedown',    e => startResize(e, 'e'));
  edgeW.addEventListener('mousedown',    e => startResize(e, 'w'));

  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    const MAX_SIZE = Math.min(window.innerWidth, window.innerHeight) * 0.9;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    let delta;
    if      (resizeAxis === 'n')  delta = -dy;
    else if (resizeAxis === 's')  delta =  dy;
    else if (resizeAxis === 'e')  delta =  dx;
    else if (resizeAxis === 'w')  delta = -dx;
    else if (resizeAxis === 'nw') delta = (-dx + -dy) / 2;
    else if (resizeAxis === 'ne') delta = ( dx + -dy) / 2;
    else if (resizeAxis === 'sw') delta = (-dx +  dy) / 2;
    else                          delta = ( dx +  dy) / 2; // se

    const newSize = Math.max(MIN_SIZE, Math.min(MAX_SIZE, origSize + delta));
    wrap.style.width  = newSize + 'px';
    wrap.style.height = newSize + 'px';

    if (resizeAxis === 'n' || resizeAxis === 'nw' || resizeAxis === 'ne')
      item.style.top  = (origTop  + origSize - newSize) + 'px';
    if (resizeAxis === 'w' || resizeAxis === 'nw' || resizeAxis === 'sw')
      item.style.left = (origLeft + origSize - newSize) + 'px';

    updateHandleAndEdges();
  });

  document.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    document.body.style.userSelect = '';
    const newSize = parseInt(wrap.style.width);
    const s = itemState[key] || {};
    itemState[key] = {
      left:   parseInt(item.style.left) || s.left || 0,
      top:    parseInt(item.style.top)  || s.top  || 0,
      size:   newSize,
      pinned: true,
    };
  });
}

// ── MOBILE TOUCH (drag + pinch-to-resize) ──
function initMobileTouch(item) {
  const key  = item.dataset.project;
  const wrap = item.querySelector('.index-thumb-wrap');
  const MIN_SIZE = 60;

  let mode = null, dragId = null;
  let dragStartX, dragStartY, dragOrigLeft, dragOrigTop;
  let dragMoved = false, itemWasMoved = false;
  let pinchStartDist = 0, pinchOrigSize = 0;

  function touchDist(t1, t2) {
    const dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function touchMid(t1, t2) {
    return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
  }

  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 1 && mode === null) {
      mode        = 'drag';
      dragMoved   = false;
      const t     = e.touches[0];
      dragId      = t.identifier;
      dragStartX  = t.clientX;
      dragStartY  = t.clientY;
      dragOrigLeft = parseInt(item.style.left) || 0;
      dragOrigTop  = parseInt(item.style.top)  || 0;
    } else if (e.touches.length === 2) {
      mode           = 'pinch';
      pinchStartDist = touchDist(e.touches[0], e.touches[1]);
      pinchOrigSize  = parseInt(wrap.style.width) || 200;
    }
  }, { passive: true });

  wrap.addEventListener('touchmove', e => {
    if (mode === 'drag' || mode === 'pinch') e.preventDefault();

    if (mode === 'drag' && e.touches.length === 1) {
      const t = Array.from(e.touches).find(x => x.identifier === dragId);
      if (!t) return;
      const dx = t.clientX - dragStartX;
      const dy = t.clientY - dragStartY;
      if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
        dragMoved = true; itemWasMoved = true; bringToFront(item);
      }
      if (!dragMoved) return;
      item.style.left = (dragOrigLeft + dx) + 'px';
      item.style.top  = (dragOrigTop  + dy) + 'px';
    } else if (mode === 'pinch' && e.touches.length >= 2) {
      const d       = touchDist(e.touches[0], e.touches[1]);
      const scale   = d / pinchStartDist;
      const maxSize = Math.min(window.innerWidth, window.innerHeight) * 0.9;
      const newSize = Math.max(MIN_SIZE, Math.min(maxSize, pinchOrigSize * scale));
      wrap.style.width  = newSize + 'px';
      wrap.style.height = newSize + 'px';
      itemWasMoved = true;
      bringToFront(item);
      const mid = touchMid(e.touches[0], e.touches[1]);
      item.style.left = (mid.x - newSize / 2) + 'px';
      item.style.top  = (mid.y - newSize / 2) + 'px';
    }
  }, { passive: false });

  wrap.addEventListener('touchend', e => {
    if (e.touches.length === 0) {
      const wasTap = !dragMoved && !itemWasMoved;
      const s = itemState[key] || {};
      itemState[key] = {
        left:   parseInt(item.style.left),
        top:    parseInt(item.style.top),
        size:   parseInt(wrap.style.width) || s.size || 200,
        pinned: !wasTap,
      };
      mode = null; dragId = null; dragMoved = false; itemWasMoved = false;

      if (wasTap) {
        // Prevent any stray click events from also firing
        suppressNextClick = true;
        setTimeout(() => { suppressNextClick = false; }, 400);
        handleItemActivate(key, item);
      }
    } else if (e.touches.length === 1 && mode === 'pinch') {
      // Transition from pinch back to single-finger drag
      mode        = 'drag';
      const t     = e.touches[0];
      dragId      = t.identifier;
      dragStartX  = t.clientX;
      dragStartY  = t.clientY;
      dragOrigLeft = parseInt(item.style.left) || 0;
      dragOrigTop  = parseInt(item.style.top)  || 0;
    }
  }, { passive: true });
}

// ── ITEM ACTIVATION (shared tap/click logic) ──
function handleItemActivate(key, item) {
  const p = projects[key];
  if (!p) return;
  if (activeKey === key) { closeGallery(); return; }
  if (p.gallery) {
    activeKey = key;
    stopAllSlideshows();
    openGallery(key);
  } else if (p.link) {
    window.open(p.link, '_blank', 'noopener');
  }
}

// ── INIT ──
window.addEventListener('load', () => {
  randomLayout(false);

  document.querySelectorAll('.index-item').forEach(item => {
    if (!('ontouchstart' in window)) initDrag(item);
    initResize(item);
    initMobileTouch(item);
  });

  fetchGalleryImages().then(() => {
    const imgs = Array.from(document.querySelectorAll('.index-thumb-wrap img'));
    let loaded = 0, relaidOut = false;
    function checkDone() {
      loaded++;
      if (loaded >= imgs.length && !relaidOut) {
        relaidOut = true;
        randomLayout(true);
        startAllSlideshows();
        document.querySelectorAll('.index-item').forEach(el => el.style.opacity = '1');
      }
    }
    imgs.forEach(img => {
      if (img.complete && img.naturalHeight > 0) checkDone();
      else if (!img.src || img.src === window.location.href) checkDone(); // no src set
      else {
        img.addEventListener('load',  checkDone);
        img.addEventListener('error', checkDone);
      }
    });
  });
});

window.addEventListener('resize', () => { closeGalleryUI(); randomLayout(false); });

// ── SLIDESHOWS ──
function startAllSlideshows() {
  document.querySelectorAll('.index-item').forEach(item => {
    const key = item.dataset.project;
    const p   = projects[key];
    if (!p || !p.images || p.images.length < 2 || item._indexInterval) return;
    let idx = 0;
    const speed    = 1000 + Math.random() * 3000;
    const thumbImg = item.querySelector('.index-thumb-wrap img');
    item._indexInterval = setInterval(() => {
      idx = (idx + 1) % p.images.length;
      thumbImg.src = p.images[idx].url;
    }, speed);
  });
}

function stopAllSlideshows() {
  document.querySelectorAll('.index-item').forEach(item => {
    if (item._indexInterval) { clearInterval(item._indexInterval); item._indexInterval = null; }
  });
}

// ── GALLERY UI (no history manipulation) ──
function openGalleryUI(key) {
  const p = projects[key];
  if (!p || !p.images) return;

  galleryGrid.innerHTML = '';
  p.images.forEach((imgData, i) => {
    if (imgData.url.endsWith('.pdf')) {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'width:100%;position:relative;';
      const embed = document.createElement('embed');
      embed.src       = imgData.url + '#toolbar=0&navpanes=0&scrollbar=0';
      embed.type      = 'application/pdf';
      embed.style.cssText = 'width:100%;height:80vh;display:block;border:none;';
      wrap.appendChild(embed);
      galleryGrid.appendChild(wrap);
    } else {
      const img       = document.createElement('img');
      img.src         = imgData.url;
      img.loading     = 'lazy';
      img.dataset.index = i;
      galleryGrid.appendChild(img);
    }
  });

  const cols = { bioephemera: 3, headphones: 4, unsubscribe: 4, zines: 1, trees: 3 }[key] ?? 3;  galleryGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  galleryCloseBtn.style.display = 'block';
  document.body.classList.toggle('zines-open', key === 'zines');

  const titleEl = isMob() ? mobPanelTitle : deskPanelTitle;
  titleEl.innerHTML = p.link
    ? `<a href="${p.link}" target="_blank" rel="noopener">${p.title}</a>`
    : p.title;
    mobPanelTitle.style.transform = '';
    mobPanelTitle.style.transition = '';
  titleEl.classList.add('visible');

  galleryOverlay.style.width      = '100%';
  galleryOverlay.style.transition = 'none';
  galleryOverlay.style.transform  = 'translateX(-100%)';
  galleryOverlay.style.display    = 'block';

  requestAnimationFrame(() => {
    galleryOverlay.style.transition = 'transform 0.45s cubic-bezier(0.4,0,0.2,1)';
    galleryOverlay.style.transform  = 'translateX(0)';
  });

  setTimeout(() => { galleryOverlay.scrollTop = 0; }, 50);
}

function closeGalleryUI() {
  if (closeGalleryTimer) { clearTimeout(closeGalleryTimer); closeGalleryTimer = null; }
  activeKey = null;
  galleryCloseBtn.style.display = 'none';
  document.body.classList.remove('zines-open');

 requestAnimationFrame(() => {
  mobPanelTitle.classList.remove('visible');
  deskPanelTitle.classList.remove('visible');
  galleryOverlay.style.transition = 'transform 0.45s cubic-bezier(0.4,0,0.2,1)';
  galleryOverlay.style.transform  = 'translateX(-100%)';
  });

  closeGalleryTimer = setTimeout(() => {
    galleryOverlay.style.display    = 'none';
    galleryOverlay.style.transform  = '';
    galleryOverlay.style.transition = '';
    galleryGrid.innerHTML           = '';
    mobPanelTitle.innerHTML         = '';
    deskPanelTitle.innerHTML        = '';
    startAllSlideshows();

  }, 450);
}

}

function closeGallery() {

}

galleryCloseBtn.addEventListener('click', e => { e.stopPropagation(); closeGallery(); });

// ── GALLERY SWIPE-TO-CLOSE (mobile) ──
function initGallerySwipe() {
  let startX, startY, currentX, dragging = false, axisLocked = null;

  galleryOverlay.addEventListener('touchstart', e => {
    if (!activeKey || lightbox.classList.contains('visible')) return;
    startX = currentX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dragging   = true;
    axisLocked = null;
    galleryOverlay.style.transition = 'none';
    mobPanelTitle.style.transition = 'none';
  }, { passive: true });

  galleryOverlay.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (axisLocked === null && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
      axisLocked = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
    }
    if (axisLocked === 'y') return;
    e.preventDefault();
    currentX = e.touches[0].clientX;
    if (dx > 0) return; // only drag left
    galleryOverlay.style.transform = `translateX(${dx}px)`;
    mobPanelTitle.style.transform = `translateX(${dx}px)`;
  }, { passive: false });

  galleryOverlay.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    if (axisLocked === 'y') return;
    const dx        = currentX - startX;
    const threshold = window.innerWidth * 0.25;
    galleryOverlay.style.transition = 'transform 0.35s cubic-bezier(0.4,0,0.2,1)';
    if (Math.abs(dx) > threshold) {
      galleryOverlay.style.transform = 'translateX(-100%)';
      mobPanelTitle.style.transition = 'transform 0.35s cubic-bezier(0.4,0,0.2,1)';
      mobPanelTitle.style.transform  = 'translateX(-100vw)';
      setTimeout(() => history.back(), 350);
    } else {
      galleryOverlay.style.transform = 'translateX(0)';
      mobPanelTitle.style.transition = 'transform 0.35s cubic-bezier(0.4,0,0.2,1)';
      mobPanelTitle.style.transform  = 'translateX(0)';
    }
  });
}
initGallerySwipe();

// ── LIGHTBOX META ──
function formatMeta(imgData, key) {
  const lines = [];
  if (key === 'unsubscribe' || key === 'headphones') {
    if (imgData.taken_at) {
      const d = new Date(imgData.taken_at);
      lines.push(`${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}/${d.getFullYear()}`);
    }
  if (key === 'headphones' && imgData.lat != null && imgData.lng != null) {
      lines.push(`(${parseFloat(imgData.lat).toFixed(4)}, ${parseFloat(imgData.lng).toFixed(4)})`);
    }
  } else if (key === 'zines') {
    if (imgData.question_1) lines.push(imgData.question_1);
    if (imgData.question_2) lines.push(imgData.question_2);
    if (imgData.scanned)    lines.push(imgData.scanned);
  } else if (key === 'trees') {
  if (imgData.taken_at) {
    const d = new Date(imgData.taken_at);
    lines.push(`${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}/${d.getFullYear()}`);
  }
  } else if (key === 'bioephemera') {
    if (imgData.plant) lines.push(imgData.plant);
    if (imgData.book) {
      const bookHTML = imgData.book_link
        ? `<a href="${imgData.book_link}" target="_blank" rel="noopener"><em>${imgData.book}</em></a>`
        : `<em>${imgData.book}</em>`;
      lines.push(bookHTML);
    }
    if (imgData.location) lines.push(imgData.location);
    if (imgData.scanned)  lines.push(imgData.scanned);
  }
  return lines.join('<br>');
}

function navigateLightbox(index) {
  showLightboxUI(index);
  history.replaceState({ view: 'lightbox', key: activeKey, index: lightboxIndex }, '', `#${activeKey}/${lightboxIndex}`);
}

galleryGrid.addEventListener('click', e => {
  const img = e.target.closest('#gallery-grid img');
  if (!img) return;
  e.stopPropagation();
  showLightbox(parseInt(img.dataset.index, 10));
});

lightboxClose.addEventListener('click', e => { e.stopPropagation(); closeLightbox(); });
lightboxPrev.addEventListener('click',  e => { e.stopPropagation(); navigateLightbox(lightboxIndex - 1); });
lightboxNext.addEventListener('click',  e => { e.stopPropagation(); navigateLightbox(lightboxIndex + 1); });
lightbox.addEventListener('click',      e => { if (e.target === lightbox) closeLightbox(); });

// ── LIGHTBOX SWIPE + PINCH-TO-ZOOM (mobile) ──
let touchStartX = null;

lightbox.addEventListener('touchstart', e => {
  if (e.touches.length === 2) return; // let pinch handle it
  touchStartX = e.touches[0].clientX;
}, { passive: true });

lightbox.addEventListener('touchend', e => {
  if (mobileZoomScale > 1) return; // disable swipe when zoomed
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  touchStartX = null;
  if (Math.abs(dx) < 40) return;
  if (dx < 0) navigateLightbox(lightboxIndex + 1);
  else        navigateLightbox(lightboxIndex - 1);
}, { passive: true });

lightbox.addEventListener('touchmove', e => {
  if (e.touches.length !== 2) return;
  e.preventDefault();
  const [a, b] = e.touches;
  const dist   = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
  if (mobileZoomLastDist) {
    mobileZoomScale = Math.min(4, Math.max(1, mobileZoomScale * (dist / mobileZoomLastDist)));
    lightboxImg.style.transform = `scale(${mobileZoomScale})`;
  }
  mobileZoomLastDist = dist;
}, { passive: false });

// ── HISTORY ──
window.addEventListener('popstate', () => {
  poppingState = true;
  if (lightbox.classList.contains('visible')) {
    closeLightboxUI();
  } else if (activeKey) {
    closeGalleryUI();
  }
  poppingState = false;
});

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (lightbox.classList.contains('visible')) {
    if (e.key === 'ArrowLeft')  navigateLightbox(lightboxIndex - 1);
    if (e.key === 'ArrowRight') navigateLightbox(lightboxIndex + 1);
    if (e.key === 'Escape')     closeLightbox();
  } else if (activeKey) {
    if (e.key === 'Escape') closeGallery();
  }
});

// ── TRACKPAD HORIZONTAL SWIPE TO CLOSE ──
let wheelGestureLock = false;
window.addEventListener('wheel', e => {
  if (wheelGestureLock) return;
  if (Math.abs(e.deltaX) < Math.abs(e.deltaY)) return; // vertical scroll — ignore
  if (!activeKey && !lightbox.classList.contains('visible')) return;
  if (e.deltaX > 80) {
    wheelGestureLock = true;
    history.back();
    setTimeout(() => { wheelGestureLock = false; }, 500);
  }
}, { passive: true });
</script>
